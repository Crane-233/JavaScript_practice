<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing</title>
    <script src="drawingLibrary.js"></script> 
    <!-- 函数库需要在<head>标签内启用，使用<script>标签和src地址refer到需要载入的函数库。函数库的后缀是js，同时名字要被双引号包裹。效果等同于将该函数库的所有内容复制粘贴到这里。 -->
</head>
<body>
    <script>
        drawRightArrow(30, "Blue", 10) //阅读函数库内的函数，注意调用函数时，填入的参数是什么类型。比如说是“whole number”还是“string”

        drawRectangle(5,10,"Red",10)
        drawRectangle(5,10,"Grean",20)
        drawRectangle(5,10,"Blue",30)

        drawLeftArrow(30, "Red", 10)
    </script>
</body>
</html>
